<!DOCTYPE html>
<html>
<head>
    <title>Report Card</title>
    <style>
        table { border-collapse: collapse; width: 60%; margin: 20px auto; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
    </style>
</head>
<body>
    <h1>Student Report Card</h1>
    <table>
        <tr>
            <th>Name</th>
            <th>Subject</th>
            <th>Marks</th>
            <th>Grade</th>
        </tr>
        <tr>
            <td>Alice</td>
            <td>Math</td>
            <td>85</td>
            <td>B+</td>
        </tr>
        <tr>
            <td>Bob</td>
            <td>Science</td>
            <td>92</td>
            <td>A</td>
        </tr>
        <tr>
            <td>Charlie</td>
            <td>History</td>
            <td>78</td>
            <td>C+</td>
        </tr>
    </table>
</body>
</html>
