<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <style>
        form { width: 400px; margin: 20px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        label { display: inline-block; width: 100px; font-weight: bold; }
        input, select, textarea { margin-bottom: 15px; width: 250px; padding: 5px; }
        .radio-group label { width: auto; font-weight: normal; }
        .checkbox-group label { width: auto; font-weight: normal; }
        input[type=submit] { background-color: #4CAF50; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Sign Up</h1>
    <form action="#" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="username" required><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="useremail" required><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="userpass" required><br>

        <label for="country">Country:</label>
        <select id="country" name="country">
            <option value="india">India</option>
            <option value="usa">USA</option>
            <option value="uk">UK</option>
            <option value="canada">Canada</option>
        </select><br>

        <label>Gender:</label>
        <div class="radio-group">
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div><br>

        <label>Skills:</label>
        <div class="checkbox-group">
            <input type="checkbox" id="html" name="skills" value="HTML">
            <label for="html">HTML</label>
            <input type="checkbox" id="css" name="skills" value="CSS">
            <label for="css">CSS</label>
            <input type="checkbox" id="js" name="skills" value="JavaScript">
            <label for="js">JavaScript</label>
        </div><br>

        <input type="submit" value="Register">
    </form>
</body>
</html>
