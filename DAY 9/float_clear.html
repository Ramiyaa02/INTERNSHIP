<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float Clear Example</title>
    <style>
        .float-left {
            float: left;
            margin-right: 20px;
        }
        .clear {
            clear: both;
        }
    </style></head>
<body>
<div class="container">
    <img src="https://via.placeholder.com/150" alt="placeholder" class="float-left">
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. ... (long text) ...</p>
    <p class="clear">This paragraph clears the float.</p>
</div>
</body></html>
