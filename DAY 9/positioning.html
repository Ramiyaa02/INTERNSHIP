<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning Example</title>
    <style>
        .card {
            position: relative;
            width: 300px;
            padding: 20px;
            border: 1px solid #ccc;
            margin: 20px;
        }
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: red;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
        }
    </style>
<div class="card">
    <h3>Product Name</h3>
    <p>Description...</p>
    <span class="badge">New!</span>
</div>
