<!DOCTYPE html>
<html>
<head>
    <style>
        body { background-color: #f0f0f0; }
        h1 { color: red; } /* named color */
        p.hex { color: #ff5733; } /* hex */
        p.rgb { color: rgb(255, 87, 51); } /* rgb */
        p.rgba { color: rgba(255, 87, 51, 0.6); } /* rgba with transparency */
        p.hsl { color: hsl(9, 100%, 60%); } /* hsl */
        div { background-color: lightblue; padding: 10px; }
    </style>
</head>
<body>
    <h1>This is red (named color)</h1>
    <p class="hex">This is #ff5733 (hex)</p>
    <p class="rgb">This is rgb(255, 87, 51) (rgb)</p>
    <p class="rgba">This is rgba(255, 87, 51, 0.6) – semi‑transparent</p>
    <p class="hsl">This is hsl(9, 100%, 60%) (hsl)</p>
    <div>This div has lightblue background (named color)</div>
</body>
</html>
